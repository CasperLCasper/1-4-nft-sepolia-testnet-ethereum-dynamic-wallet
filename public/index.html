<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallet Visualizer — NFT Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #000; color: #fff; min-height: 100vh; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 20px; }
    h1 { font-size: 24px; background: linear-gradient(90deg, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #6b7280; font-size: 14px; margin-top: 5px; }
    
    /* Toast notifications */
    .toast { position: fixed; bottom: 20px; right: 20px; background: #1f2937; border-left: 4px solid; padding: 12px 20px; border-radius: 8px; z-index: 1000; transform: translateX(400px); transition: transform 0.3s ease; }
    .toast.show { transform: translateX(0); }
    .toast.success { border-left-color: #10b981; }
    .toast.error { border-left-color: #ef4444; }
    .toast.info { border-left-color: #3b82f6; }
    
    /* Wallet badge */
    .wallet-badge { position: fixed; top: 20px; right: 20px; background: #1f2937; padding: 8px 16px; border-radius: 40px; font-size: 12px; display: flex; align-items: center; gap: 8px; z-index: 100; }
    .wallet-dot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444; }
    .wallet-dot.connected { background: #10b981; }
    
    .controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
    button { padding: 12px 24px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: all 0.2s; background: linear-gradient(90deg, #4a90e2, #9013fe); color: #fff; }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    button:hover:not(:disabled) { transform: translateY(-2px); }
    .btn-mint { background: linear-gradient(135deg, #fff, #e8f4f0); color: #000; }
    
    .theme-selector { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
    .theme-btn { padding: 6px 14px; border-radius: 20px; border: 2px solid; background: rgba(0,0,0,0.5); font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .theme-btn.active { background: rgba(255,255,255,0.2); transform: scale(1.02); }
    .theme-classic { border-color: #0ff; color: #0ff; }
    .theme-galaxy { border-color: #c026ff; color: #c026ff; }
    
    .canvas-container { background: #000; border-radius: 16px; padding: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
    canvas { width: 100%; border-radius: 12px; display: block; }
    
    .status { text-align: center; margin-top: 15px; color: #0ff; font-size: 14px; }
    .progress-bar { width: 100%; height: 4px; background: #333; border-radius: 2px; margin-top: 10px; overflow: hidden; display: none; }
    .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #0ff, #4a90e2); transition: width 0.3s; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Dynamic Wallet Visualizer</h1>
      <p class="subtitle">Create NFT from your wallet visualization</p>
    </div>

    <div class="wallet-badge" id="walletBadge">
      <div class="wallet-dot" id="walletDot"></div>
      <span id="walletAddress">Not connected</span>
    </div>

    <div class="theme-selector" id="themeSelector">
      <button class="theme-btn theme-classic active" data-theme="classic">⭐ CLASSIC</button>
      <button class="theme-btn theme-galaxy" data-theme="galaxy">✨ GALAXY</button>
    </div>

    <div class="controls">
      <button id="connectBtn">Connect Wallet</button>
      <button id="renderBtn" disabled>Start Visualization</button>
      <button id="recordBtn" disabled>Record 5s Video</button>
      <button id="mintBtn" class="btn-mint" disabled>Mint NFT</button>
    </div>

    <div class="canvas-container">
      <canvas id="canvas" width="1200" height="700"></canvas>
    </div>

    <div class="status" id="statusMsg">Ready</div>
    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.umd.min.js"></script>
  <script>
    // ============================================ //
    // FRONTEND - TIKAI VIZUALIZĀCIJA UN INTERAKCIJA
    // ============================================ //
    
    let provider, signer, account;
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    let particles = [];
    let animationId = null;
    let frameCount = 0;
    let currentTheme = 'classic';
    let recordedVideo = null;
    let isRecording = false;
    
    // DOM elementi
    const connectBtn = document.getElementById('connectBtn');
    const renderBtn = document.getElementById('renderBtn');
    const recordBtn = document.getElementById('recordBtn');
    const mintBtn = document.getElementById('mintBtn');
    const statusMsg = document.getElementById('statusMsg');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const walletAddressSpan = document.getElementById('walletAddress');
    const walletDot = document.getElementById('walletDot');
    const toast = document.getElementById('toast');
    
    // ========== TOAST NOTIFIKĀCIJAS ==========
    function showToast(message, type = 'info') {
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    // ========== PROGRESS BAR ==========
    function setProgress(percent) {
      progressFill.style.width = `${percent}%`;
    }
    
    function showProgress() {
      progressBar.style.display = 'block';
      setProgress(0);
    }
    
    function hideProgress() {
      setTimeout(() => {
        progressBar.style.display = 'none';
        setProgress(0);
      }, 500);
    }
    
    // ========== WALLET SAVIENOŠANA ==========
    async function connectWallet() {
      try {
        if (!window.ethereum) {
          showToast('Please install MetaMask!', 'error');
          return;
        }
        provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send('eth_requestAccounts', []);
        signer = await provider.getSigner();
        account = await signer.getAddress();
        
        // Pārbauda tīklu
        const network = await provider.getNetwork();
        if (network.chainId !== 11155111n) {
          showToast('Please switch to Sepolia network', 'error');
          return;
        }
        
        walletAddressSpan.textContent = `${account.slice(0, 6)}...${account.slice(-4)}`;
        walletDot.classList.add('connected');
        renderBtn.disabled = false;
        showToast('Wallet connected!', 'success');
        statusMsg.textContent = 'Wallet connected';
      } catch (error) {
        showToast(error.message, 'error');
      }
    }
    
    // ========== VIZUALIZĀCIJA (OPTIMIZĒTA) ==========
    const THEMES = {
      classic: { hueOffset: 200, saturation: 80, lightness: 65 },
      galaxy: { hueOffset: 280, saturation: 85, lightness: 70 }
    };
    
    function generateParticles(count = 80) {
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push({
          angle: Math.random() * Math.PI * 2,
          radius: 50 + Math.random() * 400,
          speed: 0.002 + Math.random() * 0.008,
          size: 3 + Math.random() * 4,
          hue: Math.random() * 360
        });
      }
    }
    
    function draw() {
      if (!ctx) return;
      const w = canvas.width;
      const h = canvas.height;
      const cx = w / 2;
      const cy = h / 2;
      
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, w, h);
      
      const theme = THEMES[currentTheme];
      
      // Optimizēta zīmēšana ar distance pruning
      for (let i = 0; i < particles.length; i++) {
        const p1 = particles[i];
        p1.angle += p1.speed;
        const x1 = cx + Math.cos(p1.angle) * p1.radius;
        const y1 = cy + Math.sin(p1.angle) * p1.radius;
        
        // Savienojumi tikai tuvām daļiņām
        for (let j = i + 1; j < particles.length; j++) {
          const p2 = particles[j];
          const x2 = cx + Math.cos(p2.angle) * p2.radius;
          const y2 = cy + Math.sin(p2.angle) * p2.radius;
          const dx = x1 - x2;
          const dy = y1 - y2;
          
          // Distance pruning - ja par tālu, skip
          if (Math.abs(dx) > 120 || Math.abs(dy) > 120) continue;
          
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 100) {
            const alpha = 0.15 * (1 - dist / 100);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = `hsla(${(p1.hue + p2.hue) / 2}, ${theme.saturation}%, ${theme.lightness}%, ${alpha})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
        
        // Zīmē daļiņu
        const hue = (p1.hue + theme.hueOffset) % 360;
        ctx.fillStyle = `hsla(${hue}, ${theme.saturation}%, ${theme.lightness + 10}%, 0.9)`;
        ctx.beginPath();
        ctx.arc(x1, y1, p1.size, 0, Math.PI * 2);
        ctx.fill();
      }
      
      frameCount++;
      animationId = requestAnimationFrame(draw);
    }
    
    function startVisualization() {
      if (animationId) cancelAnimationFrame(animationId);
      generateParticles(80);
      draw();
      statusMsg.textContent = 'Visualization running';
      recordBtn.disabled = false;
      showToast('Visualization started', 'success');
    }
    
    // ========== VIDEO IERAKSTĪŠANA (5 sek) ==========
    async function recordVideo() {
      if (isRecording) return;
      isRecording = true;
      
      const stream = canvas.captureStream(30);
      let mimeType = 'video/webm';
      if (MediaRecorder.isTypeSupported('video/mp4')) mimeType = 'video/mp4';
      
      const recorder = new MediaRecorder(stream, { mimeType });
      const chunks = [];
      
      recorder.ondataavailable = e => chunks.push(e.data);
      recorder.onstop = () => {
        recordedVideo = new Blob(chunks, { type: mimeType });
        statusMsg.textContent = 'Video ready!';
        mintBtn.disabled = false;
        showToast('Video recorded! Ready to mint', 'success');
        isRecording = false;
      };
      
      recorder.start();
      statusMsg.textContent = 'Recording 5 seconds...';
      showProgress();
      
      let progress = 0;
      const interval = setInterval(() => {
        progress += 20;
        setProgress(progress);
      }, 1000);
      
      setTimeout(() => {
        recorder.stop();
        clearInterval(interval);
        hideProgress();
      }, 5000);
    }
    
    // ========== MINT NFT (IZMANTO BACKEND API) ==========
    async function mintNFT() {
      if (!recordedVideo) {
        showToast('Please record video first', 'error');
        return;
      }
      
      mintBtn.disabled = true;
      showProgress();
      setProgress(10);
      statusMsg.textContent = 'Capturing image...';
      
      // 1. Uzņem attēlu no canvas
      const imgBlob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.9));
      setProgress(20);
      
      statusMsg.textContent = 'Uploading image to IPFS...';
      
      // 2. Augšupielādē attēlu
      const imgFormData = new FormData();
      imgFormData.append('file', imgBlob, 'snapshot.jpg');
      const imgRes = await fetch('/api/upload-to-ipfs', { method: 'POST', body: imgFormData });
      const imgData = await imgRes.json();
      setProgress(40);
      
      statusMsg.textContent = 'Uploading video to IPFS...';
      
      // 3. Augšupielādē video
      const videoFormData = new FormData();
      videoFormData.append('file', recordedVideo, 'video.webm');
      const videoRes = await fetch('/api/upload-to-ipfs', { method: 'POST', body: videoFormData });
      const videoData = await videoRes.json();
      setProgress(60);
      
      statusMsg.textContent = 'Generating metadata...';
      
      // 4. Ģenerē metadatus caur backend
      const metaRes = await fetch('/api/generate-metadata', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          wallet: account,
          imageIpfs: imgData.ipfs,
          videoIpfs: videoData.ipfs,
          theme: currentTheme,
          ethBalance: await provider.getBalance(account).then(b => ethers.formatEther(b))
        })
      });
      const metaData = await metaRes.json();
      setProgress(80);
      
      statusMsg.textContent = 'Minting NFT...';
      
      // 5. Mint NFT caur backend ar signature
      const mintRes = await fetch('/api/mint-nft', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          wallet: account,
          metadataUri: metaData.ipfs
        })
      });
      
      const mintResult = await mintRes.json();
      setProgress(100);
      
      if (mintResult.success) {
        statusMsg.textContent = 'NFT minted successfully!';
        showToast(`✅ NFT minted! Tx: ${mintResult.transaction.slice(0, 10)}...`, 'success');
      } else {
        throw new Error(mintResult.error);
      }
      
      hideProgress();
      mintBtn.disabled = false;
    }
    
    // ========== TĒMU MAIŅA ==========
    function setTheme(theme) {
      currentTheme = theme;
      document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.theme === theme) btn.classList.add('active');
      });
      if (animationId) {
        startVisualization();
      }
    }
    
    // ========== EVENT LISTENERS ==========
    connectBtn.addEventListener('click', connectWallet);
    renderBtn.addEventListener('click', startVisualization);
    recordBtn.addEventListener('click', recordVideo);
    mintBtn.addEventListener('click', mintNFT);
    
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.addEventListener('click', () => setTheme(btn.dataset.theme));
    });
    
    // Canvas resize
    function resizeCanvas() {
      const container = canvas.parentElement;
      canvas.width = 1200;
      canvas.height = 700;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    showToast('Connect your wallet to start', 'info');
  </script>
</body>
</html>
