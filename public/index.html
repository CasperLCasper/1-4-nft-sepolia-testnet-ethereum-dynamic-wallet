<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virsburts | Secure NFT Visualizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* Iepriekšējais stils saglabāts, pievienotas statusa krāsas */
    body { font-family:'Inter',Arial,sans-serif; background:#000; color:#fff; margin:0; padding:20px; overflow-x: hidden; }
    .container { max-width:1200px; margin:auto; display:flex; flex-direction:column; align-items:center; gap:20px; }
    canvas { width:100%; max-width:960px; border-radius:12px; border:1px solid #333; background:#000; box-shadow: 0 0 30px rgba(0,255,255,0.1); }
    .controls { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
    button { padding:12px 24px; border-radius:8px; border:none; cursor:pointer; font-weight:700; transition: 0.3s; }
    #connectBtn { background: #333; color: #fff; }
    #mintBtn { background: linear-gradient(90deg, #00f2fe, #4facfe); color: #000; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    .status-area { height: 24px; font-size: 14px; color: #0ff; margin-top: 10px; }
    
    /* Theme buttons */
    .theme-selector { display:flex; gap:8px; margin-bottom:10px; }
    .t-btn { padding:6px 12px; border:1px solid #444; background:none; color:#ccc; border-radius:4px; cursor:pointer; }
    .t-btn.active { border-color:#0ff; color:#0ff; background:rgba(0,255,255,0.1); }
  </style>
</head>
<body>

<div class="container">
  <h1>V I R S B U R T S</h1>
  
  <div class="theme-selector">
    <button class="t-btn active" onclick="changeStyle('classic')">Classic</button>
    <button class="t-btn" onclick="changeStyle('galaxy')">Galaxy</button>
    <button class="t-btn" onclick="changeStyle('fire')">Fire</button>
    <button class="t-btn" onclick="changeStyle('rainbow')">Rainbow</button>
  </div>

  <canvas id="mainCanvas" width="1920" height="1080"></canvas>
  
  <div class="status-area" id="statusMsg">Gaidu maka pieslēgšanu...</div>

  <div class="controls">
    <button id="connectBtn">Connect Wallet</button>
    <button id="mintBtn" disabled>Mint NFT (0.01 ETH)</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.umd.min.js"></script>

<script>
  let provider, signer, account, animRequest;
  let particles = [];
  let currentStyle = 'classic';
  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');
  const statusMsg = document.getElementById('statusMsg');

  // --- KONFIGURĀCIJA ---
  const CONTRACT_ADDR = "0xdae7c3da53be220889abd6ab66372318fb5eb454";
  const ABI = ["function mint(address to, uint256 id, string uri) external payable"];

  // --- VIZUALIZĀCIJAS LOĢIKA ---
  function initParticles() {
    particles = [];
    for(let i=0; i<150; i++) {
      particles.push({
        r: Math.random() * 400 + 100,
        a: Math.random() * Math.PI * 2,
        s: Math.random() * 0.005 + 0.002,
        size: Math.random() * 3 + 1
      });
    }
  }

  function animate() {
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(0,0,1920,1080);
    
    particles.forEach(p => {
      p.a += p.s;
      const x = 960 + Math.cos(p.a) * p.r;
      const y = 540 + Math.sin(p.a) * p.r;
      
      ctx.beginPath();
      ctx.arc(x, y, p.size, 0, Math.PI*2);
      
      if(currentStyle === 'galaxy') {
        ctx.fillStyle = '#c026ff';
        ctx.shadowBlur = 10; ctx.shadowColor = '#c026ff';
      } else if(currentStyle === 'fire') {
        ctx.fillStyle = '#ff4400';
      } else {
        ctx.fillStyle = '#0ff';
      }
      ctx.fill();
      ctx.shadowBlur = 0;
    });
    animRequest = requestAnimationFrame(animate);
  }

  function changeStyle(s) {
    currentStyle = s;
    document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
  }

  // --- DROŠA MINTĒŠANAS PLŪSMA ---
  async function startMintProcess() {
    const mintBtn = document.getElementById('mintBtn');
    mintBtn.disabled = true;
    statusMsg.innerText = "Sagatavo bildi un augšupielādē serverī...";

    try {
      // 1. Snapshot no Canvas
      const imageData = canvas.toDataURL('image/png');

      // 2. Sūtam uz Backend (Tavs API)
      const response = await fetch('/api/prepare-nft', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          image: imageData,
          address: account,
          style: currentStyle
        })
      });

      const data = await response.json();
      if (!data.success) throw new Error(data.error);

      statusMsg.innerText = "IPFS gatavs. Apstiprini darījumu makā...";

      // 3. Īstais Mint izsaukums ar datiem, ko iedeva serveris
      const contract = new ethers.Contract(CONTRACT_ADDR, ABI, signer);
      const tx = await contract.mint(account, Date.now(), data.uri, {
        value: ethers.parseEther("0.01")
      });

      statusMsg.innerText = "Darījums nosūtīts! Gaidām blokķēdi...";
      await tx.wait();
      statusMsg.innerText = "Apsveicam! NFT ir veiksmīgi izkalts.";

    } catch (err) {
      console.error(err);
      statusMsg.innerText = "Kļūda: " + err.message;
      mintBtn.disabled = false;
    }
  }

  // --- CONNECT ---
  document.getElementById('connectBtn').onclick = async () => {
    if(!window.ethereum) return alert("Instalē MetaMask!");
    provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();
    account = await signer.getAddress();
    document.getElementById('connectBtn').innerText = account.slice(0,6) + "...";
    document.getElementById('mintBtn').disabled = false;
    initParticles();
    animate();
    statusMsg.innerText = "Maks pieslēgts. Izvēlies stilu un spied Mint!";
  };

  document.getElementById('mintBtn').onclick = startMintProcess;
</script>
</body>
</html>
