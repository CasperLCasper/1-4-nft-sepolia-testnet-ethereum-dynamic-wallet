<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic Wallet Visualizer — Manifold NFT Generator</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.umd.min.js"></script>

  <style>
    body { font-family:'Inter',Arial,sans-serif; background:#000; color:#fff; margin:0; padding:20px; }
    .container { max-width:1400px; margin:auto; display:flex; flex-direction:column; align-items:center; gap:12px; }
    h1 { font-size:24px; margin:0; text-align:center; }
    button { padding:12px 18px; border-radius:12px; border:none; cursor:pointer; font-weight:700; }
    button:disabled { opacity:0.5; cursor:not-allowed; }
    canvas { width:100%; border-radius:12px; display:block; background:#000; }
    #statusMsg { margin-top:10px; color:#0ff; }
  </style>
</head>

<body>
<div class="container">

  <h1>Dynamic Wallet Visualizer — NFT Generator</h1>

  <div>
    <button id="connectBtn">Connect Wallet</button>
    <button id="renderBtn" disabled>Render</button>
    <button id="recordBtn" disabled>Record Video</button>
    <button id="generateNFTBtn" disabled>Mint NFT (Manifold)</button>
  </div>

  <div id="accountDisplay">—</div>
  <div id="statusMsg"></div>

  <canvas id="snapshotCanvas" width="1200" height="700"></canvas>

</div>

<script>
const MANIFOLD_CONTRACT_ADDRESS = "0xdae7c3da53be220889abd6ab66372318fb5eb454";

const ADDON_STYLES = {
  classic: { color:"#0ff", displayName:"CLASSIC" },
  galaxy: { color:"#c026ff", displayName:"GALAXY" }
};

let provider, signer, account;
let canvas = document.getElementById("snapshotCanvas");
let ctx = canvas.getContext("2d");
let particles = [];
let frame = 0;
let videoBlob = null;
let currentStyle = "classic";

const connectBtn = document.getElementById("connectBtn");
const renderBtn = document.getElementById("renderBtn");
const recordBtn = document.getElementById("recordBtn");
const generateNFTBtn = document.getElementById("generateNFTBtn");

const accountDisplay = document.getElementById("accountDisplay");
const statusMsg = document.getElementById("statusMsg");

// ---------- WALLET ----------
async function connectWallet(){
  provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = await provider.getSigner();
  account = await signer.getAddress();

  accountDisplay.innerText = account;
  renderBtn.disabled = false;
  recordBtn.disabled = false;
  generateNFTBtn.disabled = false;

  statusMsg.innerText = "Wallet connected";
}

// ---------- SIMPLE PARTICLES ----------
function generateParticles(){
  particles = [];
  for(let i=0;i<80;i++){
    particles.push({
      a: Math.random()*Math.PI*2,
      r: 50 + Math.random()*300,
      s: 0.002 + Math.random()*0.01,
      hue: Math.random()*360
    });
  }
}

// ---------- RENDER ----------
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const cx = canvas.width/2;
  const cy = canvas.height/2;

  particles.forEach(p=>{
    p.a += p.s;
    const x = cx + Math.cos(p.a)*p.r;
    const y = cy + Math.sin(p.a)*p.r;

    const style = ADDON_STYLES[currentStyle];

    ctx.fillStyle = `hsla(${p.hue},100%,70%,0.8)`;
    ctx.beginPath();
    ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fill();
  });

  frame++;
  requestAnimationFrame(draw);
}

// ---------- RENDER INIT ----------
function render(){
  generateParticles();
  draw();
  statusMsg.innerText = "Rendering...";
}

// ---------- RECORD ----------
async function recordVideo(){
  const stream = canvas.captureStream(30);
  const rec = new MediaRecorder(stream);
  const chunks = [];

  rec.ondataavailable = e => chunks.push(e.data);

  rec.onstop = () => {
    videoBlob = new Blob(chunks,{type:"video/webm"});
    statusMsg.innerText = "Video ready";
  };

  rec.start();
  statusMsg.innerText = "Recording...";
  setTimeout(()=>rec.stop(),5000);
}

// ---------- IPFS ----------
async function upload(file){
  const fd = new FormData();
  fd.append("file",file);
  const res = await fetch("/api/uploadToIPFS",{method:"POST",body:fd});
  return await res.json();
}

async function uploadMeta(metadata){
  const res = await fetch("/api/uploadMetadataToIPFS",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({metadata})
  });
  return await res.json();
}

// ---------- MINT (FULL MANIFOLD FALLBACK) ----------
async function mintNFT(){
  if(!videoBlob) return alert("Record video first");

  statusMsg.innerText = "Uploading image...";
  const imgBlob = await new Promise(r=>canvas.toBlob(r,"image/jpeg",0.9));

  const img = await upload(new File([imgBlob],"img.jpg"));

  statusMsg.innerText = "Uploading video...";
  const vid = await upload(new File([videoBlob],"video.webm"));

  const metadata = {
    name:"Wallet NFT",
    description:"Generative wallet NFT",
    image:img.ipfs,
    animation_url:vid.ipfs,
    attributes:[
      {trait_type:"Style",value:currentStyle}
    ]
  };

  const meta = await uploadMeta(metadata);

  statusMsg.innerText = "Minting via Manifold...";

  const abi = [
    "function mint(address,uint256,string) payable",
    "function mintWithETH(address,uint256,string) payable",
    "function purchase(uint256,string) payable"
  ];

  const contract = new ethers.Contract(MANIFOLD_CONTRACT_ADDRESS, abi, signer);
  const tokenId = Math.floor(Math.random()*1e9);

  try {
    const tx = await contract.mint(account, tokenId, meta.ipfs, {
      value: ethers.parseEther("0.01")
    });
    await tx.wait();
  } catch(e1){
    try {
      const tx = await contract.mintWithETH(account, tokenId, meta.ipfs, {
        value: ethers.parseEther("0.01")
      });
      await tx.wait();
    } catch(e2){
      const tx = await contract.purchase(tokenId, meta.ipfs, {
        value: ethers.parseEther("0.01")
      });
      await tx.wait();
    }
  }

  statusMsg.innerText = "NFT minted 🚀";
}

// ---------- EVENTS ----------
connectBtn.onclick = connectWallet;
renderBtn.onclick = render;
recordBtn.onclick = recordVideo;
generateNFTBtn.onclick = mintNFT;

</script>
</body>
</html>
